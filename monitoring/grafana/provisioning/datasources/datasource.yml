apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: request_id
          matcherRegex: request_id\":\"([^\"]+)\"
          url: "$1"
        - name: tenant_id
          matcherRegex: tenant_id\":\"([^\"]+)\"
          url: "$1"
      timeout: 60
    secureJsonData: {}
