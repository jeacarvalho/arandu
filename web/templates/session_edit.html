{{define "content"}}
<header class="mb-12">
    <h1 class="text-3xl font-bold text-arandu-text leading-tight">Editar Sessão</h1>
    <p class="text-arandu-text-secondary mt-2">Atualize o encontro terapêutico com {{.Patient.Name}}</p>
</header>

<div class="bg-white rounded-lg shadow-sm border border-gray-100">
    <form method="POST" action="/sessions/update/" class="p-8">
        <input type="hidden" name="session_id" value="{{.Session.ID}}">

        <div class="mb-8">
            <label for="date" class="block text-sm font-medium text-arandu-text-secondary mb-2">Data da Sessão</label>
            <input type="date" id="date" name="date" required class="block w-full px-4 py-3 bg-gray-50 border-gray-200 rounded-md text-arandu-text placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-arandu-primary-focus focus:border-transparent transition" value="{{.Session.Date.Format "2006-01-02"}}">
        </div>

        <div class="mb-8">
            <label for="summary" class="block text-sm font-medium text-arandu-text-secondary mb-2">Resumo da Sessão</label>
            <textarea id="summary" name="summary" rows="10" placeholder="Descreva os principais pontos discutidos, observações clínicas, intervenções e reflexões..." class="block w-full px-4 py-3 bg-gray-50 border-gray-200 rounded-md text-arandu-text placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-arandu-primary-focus focus:border-transparent transition font-serif text-base">{{.Session.Summary}}</textarea>
        </div>

        <div class="flex items-center justify-end space-x-4 pt-6 border-t border-gray-100">
            <a href="/patient/{{.Patient.ID}}" class="px-6 py-2.5 rounded-md text-sm font-semibold text-arandu-text-secondary hover:bg-gray-100 transition">
                Cancelar
            </a>
            <button type="submit" class="px-6 py-2.5 rounded-md text-sm font-semibold text-white bg-arandu-primary hover:bg-arandu-primary-dark transition">
                Salvar Alterações
            </button>
        </div>
    </form>
</div>
{{end}}
