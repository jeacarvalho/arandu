{{define "layout"}}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arandu — Sistema de Inteligência Clínica</title>
    <link href="/static/css/tailwind.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 p-4">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-primary">Arandu</h1>
                <p class="text-sm text-gray-600">Sistema de Inteligência Clínica</p>
            </div>
            
            <nav>
                <a href="/dashboard" class="block py-2 px-3 rounded hover:bg-gray-100 mb-1">Dashboard</a>
                <a href="/patients" class="block py-2 px-3 rounded hover:bg-gray-100 mb-1">Pacientes</a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="flex-1 p-6">
            {{template "content" .}}
        </main>

        <!-- Right panel (Insights) -->
        <aside class="w-80 bg-white border-l border-gray-200 p-4">
            <h2 class="text-lg font-semibold mb-4">Insights</h2>
            <div id="insights-panel">
                {{range .Insights}}
                <div class="mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded">
                    <p class="text-sm">{{.Content}}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-xs text-gray-500">{{.Source}}</span>
                        <span class="text-xs text-gray-500">{{.CreatedAt.Format "02/01/2006"}}</span>
                    </div>
                </div>
                {{else}}
                <p class="text-gray-500 text-sm">Nenhum insight disponível.</p>
                {{end}}
            </div>
        </aside>
    </div>
</body>
</html>
{{end}}
