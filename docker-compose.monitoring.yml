version: '3.8'

networks:
  arandu-monitoring:
    driver: bridge

services:
  loki:
    image: grafana/loki:2.9.0
    container_name: arandu-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - arandu-monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: arandu-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - arandu-monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    container_name: arandu-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=arandu2024
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/arandu-ops.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - loki
    networks:
      - arandu-monitoring
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
